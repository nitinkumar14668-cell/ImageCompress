<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="zip-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity="0.15" />
    </filter>
  </defs>
  
  <!-- Back Image Frame -->
  <rect x="76" y="76" width="310" height="310" rx="36" fill="white" filter="url(#shadow)" />
  <rect x="90" y="90" width="282" height="282" rx="20" fill="url(#bg-grad)" />
  
  <!-- Sun -->
  <circle cx="160" cy="150" r="36" fill="#fbbf24" />
  
  <!-- Mountains -->
  <path d="M90 372 L180 250 L250 320 L290 270 L372 372 Z" fill="#1e40af" />
  
  <!-- Resize Frame Overlay -->
  <rect x="186" y="186" width="250" height="250" rx="32" fill="white" filter="url(#shadow)" />
  <rect x="206" y="206" width="210" height="210" rx="16" fill="none" stroke="#22d3ee" stroke-width="16" stroke-dasharray="24 16" stroke-dashoffset="6" stroke-linecap="round" />
  
  <!-- Expand Arrows -->
  <g fill="#0f172a">
    <path d="M236 386 L386 236" fill="none" stroke="#0f172a" stroke-width="24" stroke-linecap="round" />
    <path d="M216 406 L216 348 L274 406 Z" />
    <path d="M406 216 L406 274 L348 216 Z" />
  </g>
  
  <!-- Compressor Circle Overlay -->
  <circle cx="360" cy="360" r="90" fill="white" filter="url(#shadow)" />
  <circle cx="360" cy="360" r="82" fill="url(#zip-grad)" />
  
  <!-- Zipper / Compress Arrows -->
  <g fill="white">
    <!-- Left Arrow -->
    <path d="M305 360 L325 345 L325 355 L340 355 L340 365 L325 365 L325 375 Z" />
    <!-- Right Arrow -->
    <path d="M415 360 L395 345 L395 355 L380 355 L380 365 L395 365 L395 375 Z" />
    <!-- Zipper center -->
    <rect x="352" y="300" width="16" height="12" rx="4" />
    <rect x="352" y="316" width="16" height="12" rx="4" />
    <rect x="352" y="332" width="16" height="12" rx="4" />
    <rect x="352" y="348" width="16" height="12" rx="4" />
    <rect x="352" y="364" width="16" height="12" rx="4" />
    <!-- Zipper Pull -->
    <path d="M350 380 h 20 v 30 a 10 10 0 0 1 -20 0 z" />
    <circle cx="360" cy="396" r="4" fill="url(#zip-grad)" />
  </g>
</svg>
