<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="crop-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  
  <!-- Back Image Frame -->
  <rect x="64" y="64" width="300" height="300" rx="40" fill="url(#bg-grad)" />
  <!-- Sun -->
  <circle cx="160" cy="160" r="40" fill="#fbbf24" />
  <!-- Mountains -->
  <path d="M64 300 L160 200 L240 280 L290 230 L364 300 Z" fill="#1e40af" />
  <path d="M64 364 L160 200 L240 280 L290 230 L364 364 Z" fill="#1d4ed8" />

  <!-- Crop Frame Overlay -->
  <rect x="180" y="180" width="280" height="280" rx="30" fill="white" stroke="#e2e8f0" stroke-width="8" />
  
  <!-- Dashed Border -->
  <rect x="200" y="200" width="240" height="240" rx="20" fill="none" stroke="#2dd4bf" stroke-width="16" stroke-dasharray="30 20" />
  
  <!-- Arrows -->
  <path d="M220 420 L420 220" stroke="#1e3a8a" stroke-width="24" stroke-linecap="round" />
  <polygon points="220,420 260,420 220,380" fill="#1e3a8a" />
  <polygon points="420,220 380,220 420,260" fill="#1e3a8a" />
</svg>
